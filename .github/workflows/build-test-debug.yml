name: Build & Test Debug

on:
  push:
    branches: [ master, staging, stable ]
  merge_group:
  pull_request:
    types: [ opened, reopened, synchronize, ready_for_review ]
    branches: [ master, staging, stable ]

jobs:
  build:
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Master
      uses: actions/checkout@v4.2.2

    - name: Setup Submodule
      run: |
        git submodule update --init --recursive

    - name: Pull engine updates
      uses: space-wizards/submodule-dependency@v0.1.5

    - name: Update Engine Submodules
      run: |
        cd RobustToolbox/
        git submodule update --init --recursive

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4.1.0
      with:
        dotnet-version: 9.0.x

    - name: Install dependencies
      run: dotnet restore

    - name: Build Project
      run: dotnet build --configuration DebugOpt --no-restore /m

    - name: Run Content.Tests
      run: dotnet test --no-build --configuration DebugOpt Content.Tests/Content.Tests.csproj -- NUnit.ConsoleOut=0

    - name: Create swap space (memory overflow protection)
      run: |

        if [ -f /swapfile ]; then
          echo "Disabling existing swap..."
          sudo swapoff /swapfile || true
          sudo rm /swapfile
        fi

        echo "Creating 10GB swap file..."
        sudo fallocate -l 10G /swapfile

        sudo chmod 600 /swapfile

        sudo mkswap /swapfile

        sudo swapon /swapfile

        echo ""
        echo "Swap file created successfully:"
        free -h
        echo ""
        echo "Available memory increased from 14GB to ~24GB!"


    - name: Run Content.IntegrationTests
      timeout-minutes: 30
      shell: pwsh
      run: |
        $env:DOTNET_gcServer=1
        dotnet test --no-build --configuration DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj -- `
          NUnit.MapWarningTo=Failed `
          NUnit.NumberOfTestWorkers=1 `
          NUnit.ConsoleOut=0 `

    - name: Cleanup swap space
      if: always()
      run: |
        echo "=== Cleaning up swap space ==="
        if [ -f /swapfile ]; then
          echo "Disabling and removing swap file..."
          sudo swapoff /swapfile || true
          sudo rm /swapfile
          echo "Swap file removed successfully"
        else
          echo "No swap file found, nothing to clean"
        fi
        free -h

  ci-success:
    name: Build & Test Debug
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: CI succeeded
        run: exit 0
