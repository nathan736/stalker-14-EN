    - STArtifactTier1

- type: entity
  id: STPelletToxicShard
  name: septic shard
  parent: STBasePellet
  components:
  - type: Projectile
    projectileClass: 3
    damage:
      types:
        Piercing: 2
        Mutant: 55 # this one is just right?

- type: entity
  id: BulletShotgunToxicShard
  name: bullet (septic shard)
  parent: STPelletToxicShard
  categories: [ HideSpawnMenu ]
  components:
  - type: ProjectileSpread
    proto: STPelletToxicShard
    count: 6
    spread: 12

- type: entity
  id: CartridgeShotgunToxicShard
  name: septic shard
  parent: BaseShotgunBullet
  components:
  - type: CartridgeAmmo
    proto: BulletShotgunToxicShard
  - type: Sprite
    sprite: _Stalker/Objects/artifacts.rsi
    layers:
    - state: toxic
      map: [ "enum.AmmoVisualLayers.Base" ]
      scale: 0.5,0.5

