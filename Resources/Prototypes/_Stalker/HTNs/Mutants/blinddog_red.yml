- type: htnCompound
  id: STBlindDogRedCompound
  branches:
    - tasks:
      - !type:HTNCompoundTask
        task: STBlindDogRedMeleeCombatAliveCompound # EN
    - tasks: # EN
      - !type:HTNCompoundTask
        task: STBlindDogRedMeleeCombatCritCompound
    - tasks:
      - !type:HTNCompoundTask
        task: STBlindDogRedRoarRestoreCompound
      - !type:HTNCompoundTask
        task: IdleCompound

- type: htnCompound
  id: STBlindDogRedMeleeCombatCompound
  branches:
    # Move to melee range and hit them
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:UtilityOperator
          proto: NearbyMeleeTargets
      - !type:HTNCompoundTask
        task: STBlindDogRedRoarCompound
      - !type:HTNCompoundTask
        task: STBlindDogRedMeleeAttackTargetCompound

- type: htnCompound
  id: STBlindDogRedRoarRestoreCompound
  branches:
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:SetBoolOperator
          targetKey: Roared
          value: false

- type: htnCompound
  id: STBlindDogRedRoarCompound
  branches:
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:PlaySoundOperator
          sound:
            collection: STBlindDogBark

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: RangedRange

      - !type:HTNPrimitiveTask
        operator: !type:JukeOperator
          jukeType: AdjacentTile

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: AttackDelay
          amount: 0.5

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: AttackDelay
        preconditions:
          - !type:KeyExistsPrecondition
            key: AttackDelay

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: RangedRange

      - !type:HTNPrimitiveTask
        operator: !type:JukeOperator
          jukeType: AdjacentTile

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: AttackDelay
          amount: 0.5

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: AttackDelay
        preconditions:
          - !type:KeyExistsPrecondition
            key: AttackDelay

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: RangedRange

      - !type:HTNPrimitiveTask
        operator: !type:JukeOperator
          jukeType: AdjacentTile

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: AttackDelay
          amount: 0.5

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: AttackDelay
        preconditions:
          - !type:KeyExistsPrecondition
            key: AttackDelay

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: RangedRange

      - !type:HTNPrimitiveTask
        operator: !type:JukeOperator
          jukeType: AdjacentTile

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: AttackDelay
          amount: 0.5

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: AttackDelay
        preconditions:
          - !type:KeyExistsPrecondition
            key: AttackDelay

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: RangedRange

      - !type:HTNPrimitiveTask
        operator: !type:JukeOperator
          jukeType: AdjacentTile

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: AttackDelay
          amount: 0.5

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: AttackDelay
        preconditions:
          - !type:KeyExistsPrecondition
            key: AttackDelay

      - !type:HTNPrimitiveTask
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: RangedRange

      - !type:HTNPrimitiveTask
        operator: !type:JukeOperator
          jukeType: AdjacentTile

      - !type:HTNPrimitiveTask
        operator: !type:SetFloatOperator
          targetKey: AttackDelay
          amount: 0.5

      - !type:HTNPrimitiveTask
        operator: !type:WaitOperator
          key: AttackDelay
        preconditions:
          - !type:KeyExistsPrecondition
            key: AttackDelay

      - !type:HTNPrimitiveTask
        operator: !type:SetBoolOperator
          targetKey: Roared
          value: true

- type: htnCompound
  id: STBlindDogRedMeleeAttackTargetCompound
  branches:
    # Move to melee range and hit them
    - tasks:
      - !type:HTNPrimitiveTask
        preconditions:
          - !type:KeyExistsPrecondition
            key: Target
        operator: !type:MoveToOperator
          shutdownState: PlanFinished
          pathfindInPlanning: true
          removeKeyOnFinish: false
          targetKey: TargetCoordinates
          pathfindKey: TargetPathfind
          rangeKey: MeleeRange

      - !type:HTNPrimitiveTask
        operator: !type:JukeOperator
          jukeType: AdjacentTile

      - !type:HTNPrimitiveTask
        operator: !type:MeleeOperator
          targetKey: Target
        preconditions:
          - !type:KeyExistsPrecondition
            key: Target
          - !type:TargetInRangePrecondition
            targetKey: Target
            rangeKey: MeleeRange
        services:
          - !type:UtilityService
            id: MeleeService
            proto: NearbyMeleeTargets
            key: Target

# EN
