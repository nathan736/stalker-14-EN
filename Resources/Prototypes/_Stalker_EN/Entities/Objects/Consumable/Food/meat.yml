# rat
- type: entity
  name: spiced rat meat
  parent: FoodMeatSTRatRaw
  id: FoodMeatSTRatSpiced
  description: It's more spice than meat. It won't take long to finish drying.
  suffix: Stalker, Food
  components:
  - type: STWeight
    self: 0.1
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Food/meat.rsi
    state: ratspiced
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 1
        - ReagentId: TableSalt
          Quantity: 4
  - type: Perishable
    rotAfter: 9999
    molsPerSecondPerUnitMass: 0
  - type: TimedDespawn
    lifetime: 20 # 20 seconds
  - type: SpawnOnDespawn
    prototype: FoodMeatSTRatJerked
  - type: Tag
    tags:
    - Meat

- type: entity
  name: rat jerky
  parent: FoodMeatBase
  id: FoodMeatSTRatJerked
  description: A few strands of flavorful rat meat.
  suffix: Stalker, Food
  components:
  - type: STWeight
    self: 0.1
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Food/meat.rsi
    state: ratjerked
  - type: FlavorProfile
    flavors:
    - meaty
    - salty
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Protein
          Quantity: 1
        - ReagentId: TableSalt
          Quantity: 4
  - type: Tag
    tags:
    - Meat

- type: lightCraftingRecipe
  id: MeatSTRatJerkyCraft
  results:
  - FoodMeatSTRatSpiced
  steps:
    firstIngredient: FoodMeatSTRatRaw
    secondIngredient: FoodSTSpice
    time: 3

# bloodsucker
- type: entity
  name: spiced bloodsucker tentacles
  parent: MutantPartBloodsuckerTentacles
  id: FoodSTSuckerSpiced
  description: Bloodsucker tentacles with spices rubbed into them. They'll dry if left out but it could take some time.
  suffix: Stalker, Food
  components:
  - type: STWeight
    self: 2.75
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Food/meat.rsi
    state: suckerspiced
  - type: TimedDespawn
    lifetime: 900 # 15 min
  - type: SpawnOnDespawn
    prototype: FoodMeatSTSuckerJerked
  - type: Tag
    tags:
    - Meat

- type: entity
  name: bloodsucker jerky
  parent: FoodMeatBase
  id: FoodMeatSTSuckerJerked
  description: The tentacles are rubbery and stringy with the faint smell of iron but for those unwell enough to eat them they'll keep well on long trips. Some stalkers believe it's good luck to have bloodsucker jerky on them.
  suffix: Stalker, Food
  components:
  - type: STWeight
    self: 1.5
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Food/meat.rsi
    state: suckerjerkedwhole
  - type: FlavorProfile
    flavors:
    - meaty
    - salty
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Protein
          Quantity: 15
        - ReagentId: Nutriment
          Quantity: 15
        - ReagentId: Saline
          Quantity: 15
        - ReagentId: TableSalt
          Quantity: 5
  - type: SliceableFood
    slice: FoodMeatSTSuckerJerkedSingle
    count: 4
  - type: Tag
    tags:
    - Meat

- type: entity
  name: bloodsucker jerky
  parent: FoodBase
  id: FoodMeatSTSuckerJerkedSingle
  suffix: Stalker, Food
  description: The tentacles are rubbery and stringy with the faint smell of iron but for those unwell enough to eat them they'll keep well on long trips. Some stalkers believe it's good luck to have bloodsucker jerky on them.
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - salty
  - type: Sprite
    sprite: _Stalker_EN/Objects/Consumable/Food/meat.rsi
    state: suckerjerked
  - type: STWeight
    self: 0.25
  - type: Item
    size: Tiny
    shape:
    - 0,0,0,0
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Protein
          Quantity: 5
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Saline
          Quantity: 5
        - ReagentId: TableSalt
          Quantity: 2
  - type: SliceableFood
    slice: FoodMeatSTSuckerJerkedSingle
    count: 1
  - type: Craftable # i still havent decided if this is redundant

- type: lightCraftingRecipe
  id: MeatSTSuckerJerkyCraft
  results:
  - FoodSTSuckerSpiced
  steps:
    firstIngredient: MutantPartBloodsuckerTentacles
    secondIngredient: FoodSTSpice
    time: 3
