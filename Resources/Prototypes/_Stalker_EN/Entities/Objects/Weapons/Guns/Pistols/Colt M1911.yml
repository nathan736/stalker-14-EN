# The things that I want by Max Payne. A smoke. A whiskey. For the sun to shine. 
- type: entity
  name: Colt M1911
  parent: STBaseWeaponPistol
  suffix: ST
  id: STWeaponPistolM1911
  description: A historic semi-automatic pistol in .45 ACP. Known for it's rugged performance.
  components:
  - type: STWeight
    self: 1.1
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker_EN/Objects/Weapons/Guns/Pistols/m1911.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Gun
    projectileSpeed: 40
    minAngle: 5
    maxAngle: 45
    angleIncrease: 0.8
    angleDecay: 7
    fireRate: 4.5
    soundGunshot:
      path: /Audio/_Stalker_EN/Effects/Guns/m1911_shoot.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: M1911Mag7
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 3
        whitelist:
          tags:
          - MagazineM1911
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModulePistolSilencer    
      gun_auto_sear:
        name: Insides
        priority: 2
        whitelist:
          tags:
          - STModuleAutoSear
      gun_chamber:
        name: Chamber
        startingItem:
        priority: 1
        whitelist:
          tags:
          - Cartridge45ACP
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_auto_sear: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot

