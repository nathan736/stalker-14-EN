# P99 is my fav gun from MW3
- type: entity
  name: Walther P99
  parent: STBaseWeaponPistol
  suffix: ST
  id: STWeaponPistolP99
  description: A polymer framed handgun made in Germany, firing 9x19mm rounds from a 15 round magazine. A long, smooth trigger makes it slow to fire. The ergonomic design gives this pistol low recoil.
  components:
  - type: STWeight
    self: 0.63
  - type: Sprite
    scale: 0.8, 0.8
    sprite: _Stalker_EN/Objects/Weapons/Guns/Pistols/p99.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: Gun
    projectileSpeed: 35
    minAngle: 3
    maxAngle: 20
    angleIncrease: 0.4
    angleDecay: 8
    fireRate: 5
    soundGunshot:
      path: /Audio/_Stalker_EN/Effects/Guns/p99_shoot.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: P99Mag15
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 3
        whitelist:
          tags:
          - MagazineP99
      gun_module_muzzle:
        name: Muzzle
        priority: 3
        whitelist:
          tags:
          - STWeaponModulePistolSilencer    
      gun_auto_sear:
        name: Insides
        priority: 2
        whitelist:
          tags:
          - STModuleAutoSear
      gun_chamber:
        name: Chamber
        startingItem:
        priority: 1
        whitelist:
          tags:
          - STCartridge919
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_auto_sear: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot