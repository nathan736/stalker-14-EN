# SNIPERS
# svds
- type: entity
  name: SVDS "Spectral"
  description: The cold frame hangs in the air and wisps of light wrap around it from barrel to stock. A whisper, always just behind the wielder's ear, calling them to the grave.
  parent: STWeaponSniperSVDS
  id: STWeaponSniperSVDSSpectral
  suffix: ST, T4, Reward, Halloween
  components:
  - type: STWeight
    self: -5
  - type: PersonalDamage
