
- type: entity
  parent: BoxFolderClipboardEmpty
  id: STEcoClipboard
  name: ecologist clipboard
  suffix: ST, Eco
  description: A solid white plastic clipboard equipped with a compact paper holder. It is stamped with the Ecologist logo.
  components:
  - type: Sprite
    sprite: _Stalker_EN/Objects/Misc/Clipboards/ecoclipboard.rsi
    layers:
    - state: clipboard
    - state: clipboard_paper
      map: ["clipboard_paper"]
      visible: false
    - state: clipboard_pen
      map: ["clipboard_pen"]
      visible: false
    - state: clipboard_over
  - type: Item
    sprite: _Stalker_EN/Objects/Misc/Clipboards/ecoclipboard.rsi
    size: Small
  - type: Clothing
    slots: [belt]
    quickEquip: false
    sprite: _Stalker_EN/Objects/Misc/Clipboards/ecoclipboard.rsi
  - type: RepositoryItem # stalker-en change
    categoryName: repository-miscellaneous-category
