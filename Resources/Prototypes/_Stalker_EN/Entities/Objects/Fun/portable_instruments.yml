### Base portable instruments
- type: entity
  id: BaseStructureNoCollide
  abstract: true
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Clickable
  - type: GravityAffected
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
      #  mask:
      #  - MachineMask
      #  layer:
      #  - MidImpassable
      #  - LowImpassable
  - type: Pullable
  - type: Tag
    tags:
    - Structure

- type: entity
  # This means that it's not anchored on spawn.
  id: BaseStructureDynamicNoCollide
  parent: BaseStructureNoCollide
  abstract: true
  components:
  # These might/might not be a good idea
  #  - type: MovedByPressure
  #  - type: DamageOnHighSpeedImpact
  #  - type: TileFrictionModifier
  #    modifier: 0.5
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.45,-0.45,0.45,0.45"
        density: 60
      #  mask:
      #  - MachineMask
      #  layer:
      #  - MidImpassable
      #  - LowImpassable
  - type: Clickable
  - type: Anchorable

- type: entity
  name: baseinstrument
  id: BasePortablePlaceableInstrument
  parent: BaseStructureDynamicNoCollide
  abstract: true
  components:
  - type: Instrument
  - type: ActivatableUI
    blockSpectators: true # otherwise they can play client-side music
    inHandsOnly: false
    singleUser: true
    requiresComplex: true
    verbText: verb-instrument-openui
    key: enum.InstrumentUiKey.Key
  - type: InteractionOutline
  - type: Sprite
    sprite: Objects/Fun/Instruments/structureinstruments.rsi
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: UserInterface
    interfaces:
      enum.InstrumentUiKey.Key:
        type: InstrumentBoundUserInterface
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 80
        #mask:
        #- Impassable
        #- MidImpassable
        layer:
        - Opaque
        #- MidImpassable
        #- BulletImpassable
  - type: StaticPrice
    price: 300
  - type: RequireProjectileTarget

- type: entity
  parent: BasePortablePlaceableInstrument
  id: BasePortablePlaceableInstrumentRotatable
  name: baseinstrumentrotatable
  abstract: true
  components:
  - type: Rotatable
    rotateWhileAnchored: true


