# Cordon
- type: rules
  id: AmbianceCordonDay
  rules:
    - !type:IsDayRule
    - !type:PreventInGreenzoneRule
    - !type:IsOnSpecificMapRule
      maps:
        - "Cordon"

- type: rules
  id: AmbianceCordonNight
  rules:
